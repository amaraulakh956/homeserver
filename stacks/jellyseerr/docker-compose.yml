services:
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    ports:
      - "5055:5055"
    volumes:
      - ./config:/app/config
    environment:
      - TZ=America/Toronto
    networks:
      - caddy-proxy

networks:
  caddy-proxy:
    external: true
