services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Toronto
      WEBUI_PORT: 8080
    ports:
      - "8090:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - ./qbittorrent:/config
      - /opt/media/downloads:/downloads

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Toronto
    ports:
      - "9696:9696"
    volumes:
      - ./prowlarr:/config

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Toronto
    ports:
      - "7878:7878"
    volumes:
      - ./radarr:/config
      - /opt/media/movies:/movies
      - /opt/media/downloads:/downloads

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Toronto
    ports:
      - "8989:8989"
    volumes:
      - ./sonarr:/config
      - /opt/media/shows:/tv
      - /opt/media/downloads:/downloads

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Toronto
    ports:
      - "9117:9117"
    volumes:
      - ./jackett:/config
      - /opt/media/downloads:/downloads
